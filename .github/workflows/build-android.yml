name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'
  ANDROID_BUILD_TOOLS: '34.0.0'

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  build-apk:
    name: Build Standalone APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prebuild Expo project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Create Metro config
        run: npx expo customize metro.config.js 2>/dev/null || true

      - name: Create debug keystore for signing
        run: |
          keytool -genkey -v -keystore $HOME/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US" \
            -storepass android -keypass android

      - name: Build standalone APK (release)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$HOME/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flame-dating-standalone-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 14

  build-eas:
    name: Build Release APK (EAS)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [typecheck]
    if: github.event_name == 'workflow_dispatch'
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        if: env.EXPO_TOKEN != ''
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK with EAS
        if: env.EXPO_TOKEN != ''
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          eas build --platform android --profile $PROFILE --non-interactive

      - name: Upload Release APK
        if: env.EXPO_TOKEN != ''
        uses: actions/upload-artifact@v4
        with:
          name: flame-dating-release-apk
          path: '*.apk'
          if-no-files-found: ignore
          retention-days: 14

      - name: EAS build skipped
        if: env.EXPO_TOKEN == ''
        run: |
          echo "::warning::EXPO_TOKEN secret not configured."
          echo "Set EXPO_TOKEN in repository secrets to enable EAS Build."
